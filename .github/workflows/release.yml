name: Release

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # Unsigned compile check — runs on every push. Catches toolchain/package
  # breakage (e.g. a CodexBar pin bumping swift-tools) without needing any
  # signing secrets.
  build-check:
    # macos-26: default Xcode 26.x (Swift 6.2) — the CodexBar pin needs
    # swift-tools 6.2, which macos-15's default Xcode 16.4 (Swift 6.1) lacks.
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Generate project (stub signing config)
        run: |
          cat > signing.xcconfig <<EOF
          CODE_SIGN_STYLE = Automatic
          PRODUCT_BUNDLE_IDENTIFIER = com.usagetracker.app
          EOF
          xcodegen generate

      - name: Build (unsigned)
        run: |
          xcodebuild \
            -project UsageTracker.xcodeproj \
            -scheme UsageTracker \
            -configuration Release \
            -derivedDataPath build/DerivedData \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            build

  # Full signed + notarized DMG, tag pushes only. Needs the Developer ID cert
  # secrets AND an App Store Connect API key (ASC_KEY_P8_BASE64 / ASC_KEY_ID /
  # ASC_ISSUER_ID) so xcodebuild's cloud signing can manage the provisioning
  # profiles that the app-group entitlement requires under Developer ID.
  release:
    if: startsWith(github.ref, 'refs/tags/')
    needs: build-check
    runs-on: macos-26
    timeout-minutes: 45
    steps:
      - uses: actions/checkout@v4

      - name: Install xcodegen
        run: brew install xcodegen

      - name: Import Developer ID certificate
        env:
          DEVELOPER_ID_CERT_BASE64: ${{ secrets.DEVELOPER_ID_CERT_BASE64 }}
          DEVELOPER_ID_CERT_PASSWORD: ${{ secrets.DEVELOPER_ID_CERT_PASSWORD }}
          KEYCHAIN_PASSWORD: ${{ secrets.KEYCHAIN_PASSWORD }}
        run: |
          set -euo pipefail
          CERT_PATH="$RUNNER_TEMP/cert.p12"
          KEYCHAIN="$RUNNER_TEMP/build.keychain"
          echo "$DEVELOPER_ID_CERT_BASE64" | base64 --decode -o "$CERT_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN"
          security import "$CERT_PATH" -P "$DEVELOPER_ID_CERT_PASSWORD" \
              -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" $(security list-keychains -d user | tr -d '"')
          security default-keychain -s "$KEYCHAIN"
          security set-key-partition-list -S apple-tool:,apple: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN"

      - name: Generate signing.xcconfig
        env:
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          # Mirrors the local file: Automatic style so xcodebuild manages the
          # Developer ID provisioning profiles (required by the app-group
          # entitlement) via the ASC API key below.
          cat > signing.xcconfig <<EOF
          DEVELOPMENT_TEAM = $APPLE_TEAM_ID
          CODE_SIGN_STYLE = Automatic
          PRODUCT_BUNDLE_IDENTIFIER = com.usagetracker.app
          ENABLE_HARDENED_RUNTIME = YES
          OTHER_CODE_SIGN_FLAGS = --timestamp --options=runtime
          EOF

      - name: Write App Store Connect API key
        id: asc
        env:
          ASC_KEY_P8_BASE64: ${{ secrets.ASC_KEY_P8_BASE64 }}
        run: |
          set -euo pipefail
          if [ -z "$ASC_KEY_P8_BASE64" ]; then
            # No cloud-signing key — releases are built locally for now. Skip
            # the remaining steps instead of failing so a tag push stays green.
            echo "::warning::ASC_KEY_P8_BASE64 secret is missing — skipping CI release; build locally (scripts/build_dmg.sh + notarize_dmg.sh + update_appcast.sh)."
            echo "ok=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "$ASC_KEY_P8_BASE64" | base64 --decode -o "$RUNNER_TEMP/asc_key.p8"
          echo "ASC_KEY_PATH=$RUNNER_TEMP/asc_key.p8" >> "$GITHUB_ENV"
          echo "ok=true" >> "$GITHUB_OUTPUT"

      - name: Build DMG
        if: steps.asc.outputs.ok == 'true'
        env:
          ASC_KEY_ID: ${{ secrets.ASC_KEY_ID }}
          ASC_ISSUER_ID: ${{ secrets.ASC_ISSUER_ID }}
        run: ./scripts/build_dmg.sh

      - name: Notarize DMG
        if: steps.asc.outputs.ok == 'true'
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_ID_PASSWORD: ${{ secrets.APPLE_ID_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          set -euo pipefail
          xcrun notarytool submit build/Omelette.dmg \
            --apple-id "$APPLE_ID" \
            --team-id "$APPLE_TEAM_ID" \
            --password "$APPLE_ID_PASSWORD" \
            --wait
          xcrun stapler staple build/Omelette.dmg
          xcrun stapler validate build/Omelette.dmg

      - name: Upload to GitHub Release
        if: steps.asc.outputs.ok == 'true'
        uses: softprops/action-gh-release@v2
        with:
          files: build/Omelette.dmg
          generate_release_notes: true
          body: |
            See [CHANGELOG.md](CHANGELOG.md) for changes.

            ## Install
            1. Download `Omelette.dmg`
            2. Open it and drag `Omelette.app` to `~/Applications/` or `/Applications/`
            3. Launch — macOS will ask once for permission to read the `Claude Code-credentials` Keychain item; click **Always Allow**

            Requires macOS 14+ and [Claude Code](https://docs.anthropic.com/claude-code) signed in.
