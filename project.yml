name: UsageTracker
options:
  bundleIdPrefix: com.usagetracker
  deploymentTarget:
    macOS: "14.0"
  createIntermediateGroups: true
  generateEmptyDirectories: true

configFiles:
  Debug: signing.xcconfig
  Release: signing.xcconfig

packages:
  Sparkle:
    url: https://github.com/sparkle-project/Sparkle
    from: 2.6.0
  # CodexBar's UI-free core (MIT, Peter Steinberger) — multi-strategy provider
  # fetchers + models.dev pricing. Pinned to the v0.41.0 commit: 0.x APIs break
  # without notice, and a tag pin is impossible anyway (their graph contains a
  # branch-based dependency, which SPM forbids under stable-version consumers).
  CodexBar:
    url: https://github.com/steipete/CodexBar
    revision: a83a83fa4131bfbfbb62a1a8fc565fcb597ba173

settings:
  base:
    SWIFT_VERSION: "6.0"
    MACOSX_DEPLOYMENT_TARGET: "14.0"
    ENABLE_HARDENED_RUNTIME: NO
    SWIFT_STRICT_CONCURRENCY: minimal

targets:
  UsageTracker:
    type: application
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: UsageTracker
        excludes:
          - "**/*.entitlements"
      - path: UsageTrackerWidget/SharedWidgetData.swift
      - path: UsageTrackerWidget/ProviderIconView.swift
      # The shared logo catalog is deliberately under sources:, not resources: —
      # xcodegen (2.45.4) silently drops resources: entries that live outside a
      # target's source roots, while sources: auto-routes .xcassets to the
      # Resources build phase. Moving this to resources: starves the app of it.
      - path: SharedAssets/ProviderIcons.xcassets
    resources:
      - path: UsageTracker/Resources
    dependencies:
      - target: UsageTrackerWidget
      - package: Sparkle
      - package: CodexBar
        product: CodexBarCore
    # Generated Info.plist (xcodegen writes it at `generate` time). NOTE: the
    # Sparkle keys CANNOT go through INFOPLIST_KEY_* build settings — Xcode
    # injects only its own allowlisted keys that way and silently drops custom
    # ones (SUFeedURL never reached any shipped build until this block).
    info:
      path: UsageTracker/Info.plist
      properties:
        CFBundleDisplayName: Omelette
        CFBundleShortVersionString: "$(MARKETING_VERSION)"
        CFBundleVersion: "$(CURRENT_PROJECT_VERSION)"
        LSUIElement: true
        LSApplicationCategoryType: public.app-category.developer-tools
        NSHumanReadableCopyright: "© 2026 Andrei Aniukou. MIT License."
        NSPrincipalClass: NSApplication
        SUFeedURL: "https://AndreiAniukou.github.io/usage-checker/appcast.xml"
        # EdDSA public key; the private half lives in the release Mac's login
        # keychain ("Private key for signing Sparkle updates") — back it up,
        # losing it breaks the update chain for every shipped build.
        SUPublicEDKey: "MHnsTPADe6xMrC9FNW2+JGcON46j6J2JSrG/wCqpLDA="
        SUEnableAutomaticChecks: true
    settings:
      base:
        PRODUCT_NAME: Omelette
        MARKETING_VERSION: "1.8.1"
        CURRENT_PROJECT_VERSION: "22"
        CODE_SIGN_ENTITLEMENTS: UsageTracker/UsageTracker.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: NO
        COMBINE_HIDPI_IMAGES: YES
        DEAD_CODE_STRIPPING: YES

  UsageTrackerWidget:
    type: app-extension
    platform: macOS
    deploymentTarget: "14.0"
    sources:
      - path: UsageTrackerWidget
        excludes:
          - "**/*.entitlements"
          - "Info.plist"
      # Via sources:, not resources: — see the app target's note on the same path.
      - path: SharedAssets/ProviderIcons.xcassets
    settings:
      base:
        PRODUCT_NAME: UsageTrackerWidget
        PRODUCT_BUNDLE_IDENTIFIER: com.usagetracker.app.widget
        MARKETING_VERSION: "1.8.1"
        CURRENT_PROJECT_VERSION: "22"
        INFOPLIST_FILE: UsageTrackerWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: UsageTrackerWidget/UsageTrackerWidget.entitlements
        SWIFT_EMIT_LOC_STRINGS: NO
        SKIP_INSTALL: NO
